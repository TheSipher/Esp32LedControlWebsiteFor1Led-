<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESP32 Smart Home</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
width:100%;
text-align:center;
padding:30px 20px;
font-size:30px;
font-weight:600;
letter-spacing:1px;
background:#111827;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* MAIN AREA */

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

/* DASHBOARD GRID */

.dashboard{
width:100%;
max-width:500px;
display:flex;
justify-content:center;
}

/* DEVICE CARD */

.card{
width:100%;
background:#1e293b;
border-radius:22px;
padding:50px 40px;
box-shadow:0 25px 60px rgba(0,0,0,0.45);
display:flex;
flex-direction:column;
align-items:center;
gap:30px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* DEVICE NAME */

.device{
font-size:28px;
font-weight:600;
}

/* STATUS */

.status{
font-size:22px;
font-weight:500;
opacity:0.9;
}

/* SWITCH */

.switch{
position:relative;
display:inline-block;
width:180px;
height:90px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background-color:#4b5563;
transition:0.35s;
border-radius:90px;
}

.slider:before{
position:absolute;
content:"";
height:72px;
width:72px;
left:9px;
bottom:9px;
background-color:white;
transition:0.35s;
border-radius:50%;
}

input:checked + .slider{
background-color:#22c55e;
}

input:checked + .slider:before{
transform:translateX(90px);
}

/* MOBILE OPTIMIZATION */

@media (max-width:600px){

.header{
font-size:24px;
padding:25px;
}

.card{
padding:40px 30px;
gap:25px;
}

.device{
font-size:24px;
}

.status{
font-size:20px;
}

.switch{
width:160px;
height:80px;
}

.slider:before{
width:64px;
height:64px;
}

}

</style>

</head>

<body>

<div class="header">
Smart Home Control
</div>

<div class="main">

<div class="dashboard">

<div class="card">

<div class="device">Living Room Light</div>

<div class="status" id="status1">OFF</div>

<label class="switch">
<input type="checkbox" id="toggle1" onchange="toggleLED()">
<span class="slider"></span>
</label>

</div>

</div>

</div>

<script>

var firebaseConfig = {
apiKey: "AIzaSyBmBjAhMNeczOxsetv1NCe6CQxINw01_ZY",
databaseURL: "https://esp32-led-control-c30ee-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

function toggleLED(){

var toggle = document.getElementById("toggle1");

if(toggle.checked){
db.ref("led1").set(1);
}
else{
db.ref("led1").set(0);
}

}

db.ref("led1").on("value", function(snapshot){

var val = snapshot.val();

document.getElementById("toggle1").checked = val;
document.getElementById("status1").innerText = val ? "ON" : "OFF";

});

</script>

</body>

</html>
