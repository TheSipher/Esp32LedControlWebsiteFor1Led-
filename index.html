<!DOCTYPE html>

<html>

<head>
<title>ESP32 LED Control</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:60px;
margin:0;
}

h1{
font-size:48px;
margin-bottom:50px;
}

.card{
background:#1e293b;
padding:50px;
border-radius:20px;
width:320px;
margin:auto;
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h2{
font-size:32px;
margin-bottom:20px;
}

.status{
font-size:26px;
margin-top:15px;
margin-bottom:25px;
}

/* Toggle Switch */

.switch{
position:relative;
display:inline-block;
width:140px;
height:70px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background-color:#555;
transition:.4s;
border-radius:70px;
}

.slider:before{
position:absolute;
content:"";
height:56px;
width:56px;
left:7px;
bottom:7px;
background-color:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background-color:#22c55e;
}

input:checked + .slider:before{
transform:translateX(70px);
}

/* Mobile Optimization */

@media (max-width:600px){

h1{
font-size:40px;
}

.card{
width:85%;
padding:40px;
}

.switch{
width:150px;
height:75px;
}

.slider:before{
height:60px;
width:60px;
}

}

</style>

</head>

<body>

<h1>ESP32 LED Control</h1>

<div class="card">

<h2>LED 1</h2>

<div class="status" id="status1">OFF</div>

<label class="switch">
<input type="checkbox" id="toggle1" onchange="toggleLED()">
<span class="slider"></span>
</label>

</div>

<script>

var firebaseConfig = {
apiKey: "AIzaSyBmBjAhMNeczOxsetv1NCe6CQxINw01_ZY",
databaseURL: "https://esp32-led-control-c30ee-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

function toggleLED(){

var toggle = document.getElementById("toggle1");

if(toggle.checked){
db.ref("led1").set(1);
}
else{
db.ref("led1").set(0);
}

}

db.ref("led1").on("value", function(snapshot){

var val = snapshot.val();

document.getElementById("toggle1").checked = val;
document.getElementById("status1").innerText = val ? "ON" : "OFF";

});

</script>

</body>

</html>
