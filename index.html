<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESP32 LED Control</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
text-align:center;
width:100%;
max-width:700px;
padding:20px;
}

h1{
font-size:48px;
margin-bottom:50px;
}

.card{
background:#1e293b;
padding:60px;
border-radius:25px;
box-shadow:0 0 40px rgba(0,0,0,0.5);
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
width:100%;
}

h2{
font-size:34px;
margin:0;
}

.status{
font-size:28px;
font-weight:bold;
}

/* SWITCH */

.switch{
position:relative;
display:inline-block;
width:200px;
height:100px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background-color:#555;
transition:.4s;
border-radius:100px;
}

.slider:before{
position:absolute;
content:"";
height:80px;
width:80px;
left:10px;
bottom:10px;
background-color:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background-color:#22c55e;
}

input:checked + .slider:before{
transform:translateX(100px);
}

/* MOBILE OPTIMIZATION */

@media (max-width:600px){

.container{
padding:15px;
}

h1{
font-size:36px;
margin-bottom:35px;
}

.card{
padding:40px;
}

h2{
font-size:28px;
}

.status{
font-size:24px;
}

.switch{
width:170px;
height:85px;
}

.slider:before{
height:65px;
width:65px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>ESP32 LED Control</h1>

<div class="card">

<h2>LED 1</h2>

<div class="status" id="status1">OFF</div>

<label class="switch">
<input type="checkbox" id="toggle1" onchange="toggleLED()">
<span class="slider"></span>
</label>

</div>

</div>

<script>

var firebaseConfig = {
apiKey: "AIzaSyBmBjAhMNeczOxsetv1NCe6CQxINw01_ZY",
databaseURL: "https://esp32-led-control-c30ee-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

function toggleLED(){

var toggle = document.getElementById("toggle1");

if(toggle.checked){
db.ref("led1").set(1);
}
else{
db.ref("led1").set(0);
}

}

db.ref("led1").on("value", function(snapshot){

var val = snapshot.val();

document.getElementById("toggle1").checked = val;
document.getElementById("status1").innerText = val ? "ON" : "OFF";

});

</script>

</body>

</html>
