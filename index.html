<!DOCTYPE html>

<html>

<head>
<title>ESP32 LED Control</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
text-align:center;
width:100%;
max-width:900px;
padding:20px;
}

h1{
font-size:56px;
margin-bottom:60px;
}

.card{
background:#1e293b;
padding:70px;
border-radius:25px;
box-shadow:0 0 40px rgba(0,0,0,0.5);
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
}

h2{
font-size:38px;
margin:0;
}

.status{
font-size:30px;
font-weight:bold;
}

/* SWITCH */

.switch{
position:relative;
display:inline-block;
width:220px;
height:110px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background-color:#555;
transition:.4s;
border-radius:110px;
}

.slider:before{
position:absolute;
content:"";
height:90px;
width:90px;
left:10px;
bottom:10px;
background-color:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background-color:#22c55e;
}

input:checked + .slider:before{
transform:translateX(110px);
}

/* MOBILE */

@media (max-width:600px){

h1{
font-size:40px;
margin-bottom:40px;
}

.card{
padding:50px;
}

.switch{
width:190px;
height:95px;
}

.slider:before{
height:75px;
width:75px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>ESP32 LED Control</h1>

<div class="card">

<h2>LED 1</h2>

<div class="status" id="status1">OFF</div>

<label class="switch">
<input type="checkbox" id="toggle1" onchange="toggleLED()">
<span class="slider"></span>
</label>

</div>

</div>

<script>

var firebaseConfig = {
apiKey: "AIzaSyBmBjAhMNeczOxsetv1NCe6CQxINw01_ZY",
databaseURL: "https://esp32-led-control-c30ee-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

function toggleLED(){

var toggle = document.getElementById("toggle1");

if(toggle.checked){
db.ref("led1").set(1);
}
else{
db.ref("led1").set(0);
}

}

db.ref("led1").on("value", function(snapshot){

var val = snapshot.val();

document.getElementById("toggle1").checked = val;
document.getElementById("status1").innerText = val ? "ON" : "OFF";

});

</script>

</body>

</html>
