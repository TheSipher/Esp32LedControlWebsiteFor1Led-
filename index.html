<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESP32 LED Control</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* MAIN CONTAINER */

.container{
width:100%;
max-width:420px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
gap:35px;
}

/* TITLE */

h1{
font-size:34px;
font-weight:600;
margin:0;
}

/* CARD */

.card{
background:#1e293b;
width:100%;
padding:45px 35px;
border-radius:22px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
display:flex;
flex-direction:column;
align-items:center;
gap:22px;
}

/* DEVICE NAME */

h2{
font-size:26px;
margin:0;
}

/* STATUS TEXT */

.status{
font-size:22px;
font-weight:600;
letter-spacing:1px;
}

/* SWITCH */

.switch{
position:relative;
display:inline-block;
width:160px;
height:80px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background-color:#4b5563;
transition:0.35s;
border-radius:80px;
}

.slider:before{
position:absolute;
content:"";
height:64px;
width:64px;
left:8px;
bottom:8px;
background-color:white;
transition:0.35s;
border-radius:50%;
}

input:checked + .slider{
background-color:#22c55e;
}

input:checked + .slider:before{
transform:translateX(80px);
}

/* DESKTOP IMPROVEMENT */

@media (min-width:700px){

.container{
max-width:500px;
}

h1{
font-size:42px;
}

.card{
padding:60px 50px;
}

.switch{
width:190px;
height:95px;
}

.slider:before{
height:75px;
width:75px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>ESP32 LED Control</h1>

<div class="card">

<h2>LED 1</h2>

<div class="status" id="status1">OFF</div>

<label class="switch">
<input type="checkbox" id="toggle1" onchange="toggleLED()">
<span class="slider"></span>
</label>

</div>

</div>

<script>

var firebaseConfig = {
apiKey: "AIzaSyBmBjAhMNeczOxsetv1NCe6CQxINw01_ZY",
databaseURL: "https://esp32-led-control-c30ee-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

function toggleLED(){

var toggle = document.getElementById("toggle1");

if(toggle.checked){
db.ref("led1").set(1);
}
else{
db.ref("led1").set(0);
}

}

db.ref("led1").on("value", function(snapshot){

var val = snapshot.val();

document.getElementById("toggle1").checked = val;
document.getElementById("status1").innerText = val ? "ON" : "OFF";

});

</script>

</body>

</html>
